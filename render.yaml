# Render Blueprint — deploys the FastAPI backend as a free web service.
# In Render: New → Blueprint → connect this repo, and it reads this file.
services:
  - type: web
    name: foreclosure-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
